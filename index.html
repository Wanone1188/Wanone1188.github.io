<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanOne 个人导航</title>
    <style>
        body {
            margin: 0;
            background: #0f172a; /* 深蓝色背景 */
            background-image: linear-gradient(180deg, #1e293b 0%, #000000 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            min-height: 100vh;
        }
        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin-top: 50px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }
        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 25px;
        }
        /* 四个并排小按钮 */
        .grid-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        /* 核心毛玻璃按钮样式 */
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            text-align: center;
            color: white;
            text-decoration: none;
            display: block;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.2); }
        .small-btn { padding: 12px; font-size: 14px; border-radius: 12px; }
        
        .sub-text { font-size: 12px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>
    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=WanOne" class="avatar">
    <div style="margin-top: 15px; font-weight: bold;">WanOne1188</div>
    <div class="sub-text">技术分享 · 资源导航</div>

    <div class="container">
        <div class="grid-btns">
            <a href="#" class="btn small-btn">✈️ TG频道</a>
            <a href="#" class="btn small-btn">💬 TG群聊</a>
            <a href="#" class="btn small-btn">🐙 GitHub</a>
            <a href="#" class="btn small-btn">🔍 镜像仓库</a>
        </div>

        <a href="#" class="btn">🚀 裤佬公益项目汇总</a>
        <a href="#" class="btn">📺 TVbox 软件合辑</a>
        <a href="#" class="btn">📡 IPTV 资源配置</a>
    </div>

    <div style="position: fixed; bottom: 30px; right: 30px; opacity: 0.5;">🎵</div>
</body>
</html>
