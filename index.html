<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航页</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #2c3e50, #000000); /* 渐变背景 */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-top: 50px;
            border: 2px solid #fff;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            display: block;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <img src="你的头像图片地址" class="avatar">
    <h2>我的资源导航</h2>
    
    <div class="container">
        <a href="你的TG链接" class="btn">TG 频道</a>
        <a href="你的Github链接" class="btn">GitHub 仓库</a>
        <a href="你的订阅链接" class="btn" style="padding: 30px;">TVbox 软件合辑</a>
    </div>
</body>
</html>
