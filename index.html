<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanOne 资源收藏</title>
    <style>
        /* 复刻 jsnzkpg 的核心样式 */
        body {
            background: #1a1c2c;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #3e4451; }
        
        .section {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .section-title {
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .link-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }
        .item-btn {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #ccc;
            font-size: 13px;
            text-align: center;
            border: 1px solid transparent;
        }
        .item-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <img src="你的头像地址" class="avatar">
        <h3>WanOne 资源导航</h3>
    </div>

    <div class="section">
        <div class="section-title">📺 TVbox 软件合辑 <span>▼</span></div>
        <div class="link-grid">
            <a href="链接1" class="item-btn">OK影视</a>
            <a href="链接2" class="item-btn">影视仓</a>
            <a href="链接3" class="item-btn">宝盒内置版</a>
            <a href="链接4" class="item-btn">俊于小白盒</a>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🎵 音乐软件合辑 <span>▼</span></div>
        <div class="link-grid">
            <a href="#" class="item-btn">MusicFree</a>
            <a href="#" class="item-btn">洛雪音乐</a>
        </div>
    </div>

    <div style="margin-top: 50px; opacity: 0.5;">🎵</div>
</body>
</html>
